<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Трекер інцидентів кібербезпеки</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" type="module" defer></script>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <span>Завантаження…</span>
</div>

<header>
    <h1>Трекер інцидентів кібербезпеки</h1>
</header>

<main>

    <div class="panel">
        <h2>Додати інцидент</h2>
        <form id="incidentForm">
            <div class="field">
                <label for="titleInput">Назва інциденту</label>
                <input id="titleInput" type="text" placeholder="Мінімум 3 символи" />
                <p class="error-msg" id="titleError"></p>
            </div>
            <div class="field">
                <label for="typeSelect">Тип інциденту</label>
                <select id="typeSelect">
                    <option value="" disabled selected hidden>Оберіть тип</option>
                    <option value="DDoS">DDoS</option>
                    <option value="Malware">Malware</option>
                    <option value="Phishing">Phishing</option>
                    <option value="Data Leak">Data Leak</option>
                </select>
                <p class="error-msg" id="typeError"></p>
            </div>
            <div class="field">
                <label for="dateInput">Дата виявлення</label>
                <input id="dateInput" type="date" />
                <p class="error-msg" id="dateError"></p>
            </div>
            <div class="field">
                <label for="severityInput">Критичність (1–10)</label>
                <input id="severityInput" type="number" min="1" max="10" />
                <p class="error-msg" id="severityError"></p>
            </div>
            <button type="submit" class="btn-primary btn-full">Додати інцидент</button>
            <p id="statusMessage" class="status-msg"></p>
        </form>
    </div>

    <div class="panel">
        <h2>Список інцидентів</h2>
        <div class="field">
            <input id="searchInput" type="text" placeholder="Пошук за назвою" />
        </div>
        <div class="row-2">
            <select id="filterType">
                <option value="">Усі типи</option>
                <option value="DDoS">DDoS</option>
                <option value="Malware">Malware</option>
                <option value="Phishing">Phishing</option>
                <option value="Data Leak">Data Leak</option>
            </select>
            <select id="sortSelect">
                <option value="">Без сортування</option>
                <option value="dateAsc">Дата ↑</option>
                <option value="dateDesc">Дата ↓</option>
                <option value="severityAsc">Критичність ↑</option>
                <option value="severityDesc">Критичність ↓</option>
            </select>
        </div>
        <ul id="incidentList"></ul>
        <p id="emptyMessage" class="empty-msg">Записів поки немає</p>
    </div>

    <div class="panel" id="detailsPanel" style="display:none">
        <div class="details-head">
            <h2>Деталі інциденту</h2>
            <button id="detailsClose" class="btn-close">✕ Закрити</button>
        </div>
        <div id="detailsContent"></div>
        <hr class="sep" />
        <h3>Коментарі</h3>
        <div id="commentsList"></div>
        <hr class="sep" />
        <h3>Додати коментар</h3>
        <form id="commentForm">
            <div class="field">
                <label for="commentAuthor">Автор</label>
                <input id="commentAuthor" type="text" placeholder="Ваше ім'я" />
                <p class="error-msg" id="commentAuthorError"></p>
            </div>
            <div class="field">
                <label for="commentText">Текст</label>
                <textarea id="commentText" rows="3" placeholder="Введіть коментар…"></textarea>
                <p class="error-msg" id="commentTextError"></p>
            </div>
            <button type="submit" class="btn-primary btn-full">Додати коментар</button>
        </form>
    </div>

</main>

<footer>
    <p>Трекер інцидентів кібербезпеки © 2026</p>
</footer>

</body>
</html>
